name: Weekly MF Ranker

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday 4 AM UTC (~9:30 AM IST)
  workflow_dispatch:      # allows manual run also

jobs:
  run-ranker:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: ⬇️ Download latest data
        run: python scripts/download_data.py

      - name: 📊 Run MF Ranker
        run: python scripts/mf_fund_ranker.py

      - name: 📤 Upload Output File
        uses: actions/upload-artifact@v4
        with:
          name: mf-ranked-output
          path: mf_ranked_screener.xlsx
